<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纪念卡</title>
  <link rel="stylesheet" href="CSS/index.css">
  <style>
    .card a {
      color: #3b6fb2;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .card a:hover,
    .card a:focus {
      color: #1f4d8a;
      text-decoration: underline;
      transform: translateX(2px);
    }
  </style>
</head>
<body>
  <header>
    <h1>《那一天》</h1>
    <p>每天记录一个小瞬间.</p>
  </header>
  <main class="container">
    <div class="card-grid">
      <article class="card">
        <div class="date">2026-05-14</div>
        <p>中午的快去上课的时候我发现线条小狗已经快卖完了, </p>
        <p>昨天本来想着今天晚上出去的时候刚好可以买</p>
      </article>
      <article class="card">
        <div class="date">2026-1-30</div>
        <p>我去漳州找XYY啦, 十一点四十的动车。</p>
        <p>12:13 看到xyy了, 然后<a href="Anniversary/2026-01-30/12.13.jpg">偷偷摸到她旁边啦。</a></p>
        <p>然后你带我去找你好朋友tyq, 然后给我们拍照。</p>
        <p>后面就开始骑上你的你小电驴.</p>
      </article>
      <article class="card">
        <div class="date">2025-12-21</div>
        <p>这一天是我们在一起已经<a href="Anniversary/2025-12-21/dsr.jpg">60 day</a> 啦</p>
      </article>
      <article class="card">
        <div class="date">2025-10-26</div>
        <p>我们又一起偷偷出来啦</p>
      </article>
      <article class="card">
        <div class="date">2025-10-23</div>
        <p>今天是星期四, xyy我们在一起啦</p>
      </article>
    </div>
    <div class="empty">
      继续记录，让每一天都有故事。
    </div>
  </main>
</body>
</html>
