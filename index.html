<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纪念日记录卡片</title>
  <link rel="stylesheet" href="CSS/index.css">
</head>
<body>
  <header>
    <h1>纪念日记录卡片</h1>
    <p>每天记录一个小瞬间，留住每一个值得纪念的日子。</p>
  </header>
  <main class="container">
    <div class="card-grid">
      <article class="card">
        <h2>每天一张卡片</h2>
        <div class="date">2026-05-18</div>
        <p>今天是一张新的开始。用卡片记录每一天的小确幸，让时间的印记更清晰。</p>
      </article>
      <article class="card">
        <h2>特别的纪念日</h2>
        <div class="date">2026-05-17</div>
        <p>回顾曾经的美好，珍惜现在的平凡，期待未来的每一个时刻。</p>
      </article>
      <article class="card">
        <h2>心情笔记</h2>
        <div class="date">2026-05-16</div>
        <p>日常的点滴就是最真实的纪念。用文字记录，用心感受。</p>
      </article>
    </div>
    <div class="empty">
      这是你的纪念日卡片页面。继续添加更多记录，让每一天都有故事。
    </div>
  </main>
</body>
</html>
