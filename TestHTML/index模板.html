<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纪念日记录卡片</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f2ec;
      color: #3a3a3a;
    }
    header {
      background: #f2cac9;
      padding: 24px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    header p {
      margin: 8px 0 0;
      color: #6b5151;
    }
    .container {
      max-width: 960px;
      padding: 24px 16px;
      margin: 0 auto;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      color: #8a4b4b;
    }
    .card .date {
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: #8f7777;
    }
    .card p {
      margin: 0;
      line-height: 1.6;
      color: #514545;
    }
    .empty {
      text-align: center;
      color: #7a6969;
      padding: 40px 16px;
      background: #fff7f5;
      border-radius: 14px;
      border: 1px dashed #e0c2c1;
    }
  </style>
</head>
<body>
  <header>
    <h1>纪念日记录卡片</h1>
    <p>每天记录一个小瞬间，留住每一个值得纪念的日子。</p>
  </header>
  <main class="container">
    <div class="card-grid">
      <article class="card">
        <h2>每天一张卡片</h2>
        <div class="date">2026-05-18</div>
        <p>今天是一张新的开始。用卡片记录每一天的小确幸，让时间的印记更清晰。</p>
      </article>
      <article class="card">
        <h2>特别的纪念日</h2>
        <div class="date">2026-05-17</div>
        <p>回顾曾经的美好，珍惜现在的平凡，期待未来的每一个时刻。</p>
      </article>
      <article class="card">
        <h2>心情笔记</h2>
        <div class="date">2026-05-16</div>
        <p>日常的点滴就是最真实的纪念。用文字记录，用心感受。</p>
      </article>
    </div>
    <div class="empty">
      这是你的纪念日卡片页面。继续添加更多记录，让每一天都有故事。
    </div>
  </main>
</body>
</html>
